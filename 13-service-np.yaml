apiVersion: v1
kind: Service
metadata:
  name: nginx-np
  labels:
    purpose: service-np
spec:
  type: NodePort
  selector:
    purpose: service-np-demo
    project: roboshop
    env: development
  ports:
    - protocol: TCP
      port: 80 #srevice port
      targetPort: 80 # container port

--- 
apiVersion: v1
kind: Pod
metadata:
  name: nginx-np
  labels:
    purpose: service-np-demo
    project: roboshop
    env: dev   
spec:
  containers:
    - name: nginx
      image: nginx
