apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs-static-pv
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  csi:
    driver: ebs.csi.aws.com
    fsType: ext4
    volumeHandle: vol-07fbdfb474cc9e600

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-static-pv
  labels:
    purpose: ebs-static
    project: roboshop
spec:
  storageClassName: "" # Empty string must be explicitly set otherwise default StorageClass will be set
  volumeName: ebs-static-pv
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 15Gi

---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    purpose: ebs-static-demo
    project: roboshop
spec:
  containers:
    - name: nginx
      image: nginx
      volumeMounts:
        - name: persistent-storage
          mountPath: /usr/share/nginx/html
  volumes:
    - name: persistent-storage
      persistentVolumeClaim:
        claimName: ebs-static-pv

---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  labels:
     purpose: ebs-static-demo
     project: roboshop
spec:
  type: LoadBalancer
  selector:
     purpose: ebs-static-demo
     project: roboshop
  ports:
    - protocol: TCP
      port: 80 #srevice port
      targetPort: 80 # container port