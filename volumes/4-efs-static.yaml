apiVersion: v1
kind: PersistentVolume
metadata:
  name: efs-staic-pv
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  storageClassName: "" This should be empty in static provisioning
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-e8a95a42

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: efs-staic-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
   purpose: efs-static-demo
   project: roboshop
spec:
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - name: persistent-storage
      mountPath: /usr/share/nginx/html
  volumes:
  - name: persistent-storage
    persistentVolumeClaim:
      claimName: efs-staic-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: efs-static
  labels:
     purpose: efs-static-demo
     project: roboshop
spec:
  type: LoadBalancer
  selector:
     purpose: efs-static-demo
     project: roboshop
  ports:
    - protocol: TCP
      port: 80 #srevice port
      targetPort: 80 # container port