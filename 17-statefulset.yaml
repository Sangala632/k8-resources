apiVersion: v1
kind: Service
metadata:
  name: nginx-svc-headless 
  labels:
    purpose: statefulset  
    project: roboshop
spec:
  ports:
  - port: 80 #srevice port
    name: web
  clusterIP: None   
  selector:
    purpose: statefulset  
    project: roboshop

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
  labels:
    purpose: statefulset  
    project: roboshop
spec:
  ports:
  - port: 80 #srevice port
    name: web  
  selector:
    purpose: statefulset  
    project: roboshop

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nginx-statefulset
spec:
  selector:
    matchLabels:
      purpose: statefulset  
      project: roboshop
 # has to match .spec.template.metadata.labels
  serviceName: "nginx-svc-hedless"
  replicas: 3 # by default is 1
  template:
    metadata:
      labels:
        purpose: statefulset  
        project: roboshop # has to match .spec.selector.matchLabels
    spec:
      containers:
      - name: nginx
        image: nginx
        volumeMounts:
        - name: www
          mountPath: /usr/share/nginx/html
  volumeClaimTemplates:
  - metadata:
      name: www
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "efs-roboshop"
      resources:
        requests:
          storage: 2Gi

